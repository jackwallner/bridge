name: Bridge
packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm.git
    from: 5.72.0
options:
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  lastUpgradeCheck: "1600"
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  Bridge:
    type: application
    platform: iOS
    sources:
      - path: Bridge
      - path: Shared
    settings:
      base:
        DEVELOPMENT_TEAM: YXG4MP6W39
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.jackwallner.bridge
        PRODUCT_NAME: "Bridge Trainer"
        PRODUCT_MODULE_NAME: Bridge
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Bridge/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - package: RevenueCat

  BridgeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BridgeTests
    dependencies:
      - target: Bridge
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Bridge Trainer.app/Bridge Trainer"

schemes:
  Bridge:
    build:
      targets:
        Bridge: all
    run:
      config: Debug
      storeKitConfiguration: Bridge/Bridge.storekit
    test:
      config: Debug
      targets:
        - BridgeTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
